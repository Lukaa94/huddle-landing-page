<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="stlye.css">
  <script src="https://kit.fontawesome.com/b6430e4595.js" crossorigin="anonymous"></script>
  <title>Frontend Mentor | Huddle landing page with single introductory section</title>

</head>
<body>
  <img src="images/logo.svg" alt="logo" width="300" height="200" class="logo">

  <section class="container">
    <div class="image">
      <img src="images/illustration-mockups.svg" alt="mockups" >
    </div>

    <div>
      <h1>Build The Community </h1>
      <h1 class="heading-space">Your Fans Will Love</h1>
      <p>Huddle re-imagines the way we build communities. You have a voice, but so does your auidence. 
      Create connections with your users as you engage in geniuine discussion.
      </p>
      <button>Register</button>

      <footer class="icons-container">
        <div class="icon-circle">
          <i class="fa-brands fa-facebook-f"></i>
        </div>
        <div class="icon-circle">
          <i class="fa-brands fa-twitter"></i>
        </div>
        <div class="icon-circle">
          <i class="fa-brands fa-instagram"></i>
        </div>
      </footer>
    </div>
  </section>

</body>
</html>
